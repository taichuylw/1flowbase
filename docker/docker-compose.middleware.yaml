services:
  db:
    image: postgres:16-alpine
    restart: always
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-300}"]
    env_file:
      - ./middleware.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-1flowbase}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1flowbase}
    ports:
      - "${POSTGRES_PORT:-35432}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-1flowbase}"]
      interval: 5s
      timeout: 3s
      retries: 20
