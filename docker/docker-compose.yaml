name: 1flowbase

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./postgres/postgres.env
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-300}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-1flowbase}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in docker/.env}
    volumes:
      - ./postgres/data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-1flowbase}"]
      interval: 5s
      timeout: 3s
      retries: 20

  plugin-runner:
    image: ghcr.io/taichuy/1flowbase-plugin-runner:${FLOWBASE_PLUGIN_RUNNER_VERSION:-v0.1.0}
    restart: unless-stopped
    env_file:
      - ./plugin-runner/plugin-runner.env
    expose:
      - "7801"

  api:
    image: ghcr.io/taichuy/1flowbase-api-server:${FLOWBASE_API_SERVER_VERSION:-v0.1.0}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      plugin-runner:
        condition: service_started
    env_file:
      - ./api/api.env
    environment:
      API_ENV: ${API_ENV:-production}
      API_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in docker/.env}@db:5432/${POSTGRES_DB:-1flowbase}
      API_SERVER_ADDR: 0.0.0.0:7800
      API_PLUGIN_RUNNER_INTERNAL_BASE_URL: http://plugin-runner:7801
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-http://localhost:3100,http://127.0.0.1:3100}
      API_PROVIDER_INSTALL_ROOT: /app/api/plugins
      API_HOST_EXTENSION_DROPIN_ROOT: /app/api/plugins/host-extension/dropins
      API_PROVIDER_SECRET_MASTER_KEY: ${API_PROVIDER_SECRET_MASTER_KEY:?set API_PROVIDER_SECRET_MASTER_KEY in docker/.env}
      API_OFFICIAL_PLUGIN_REPOSITORY: ${API_OFFICIAL_PLUGIN_REPOSITORY:-taichuy/1flowbase-official-plugins}
      API_OFFICIAL_PLUGIN_REGISTRY_URL: ${API_OFFICIAL_PLUGIN_REGISTRY_URL:-https://raw.githubusercontent.com/taichuy/1flowbase-official-plugins/main/official-registry.json}
      BOOTSTRAP_WORKSPACE_NAME: ${BOOTSTRAP_WORKSPACE_NAME:-1flowbase}
      BOOTSTRAP_ROOT_ACCOUNT: ${BOOTSTRAP_ROOT_ACCOUNT:-root}
      BOOTSTRAP_ROOT_EMAIL: ${BOOTSTRAP_ROOT_EMAIL:-root@example.com}
      BOOTSTRAP_ROOT_PASSWORD: ${BOOTSTRAP_ROOT_PASSWORD:?set BOOTSTRAP_ROOT_PASSWORD in docker/.env}
      BOOTSTRAP_ROOT_NAME: ${BOOTSTRAP_ROOT_NAME:-Root}
      BOOTSTRAP_ROOT_NICKNAME: ${BOOTSTRAP_ROOT_NICKNAME:-Root}
    expose:
      - "7800"
    volumes:
      - ./api/storage:/app/api/storage
      - ./api/plugins/packages:/app/api/plugins/packages
      - ./api/plugins/installed:/app/api/plugins/installed
      - ./api/plugins/host-extension/dropins:/app/api/plugins/host-extension/dropins

  web:
    image: ghcr.io/taichuy/1flowbase-web:${FLOWBASE_WEB_VERSION:-v0.1.0}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3100}:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
