name: container images

on:
  push:
    tags:
      - "web/v*"
      - "api-server/v*"
      - "plugin-runner/v*"
  workflow_dispatch:
    inputs:
      component:
        description: Component image to publish.
        required: true
        type: choice
        options:
          - web
          - api-server
          - plugin-runner
      image_tag:
        description: Image tag to publish, for example v0.1.0. Must match the component manifest version.
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web
            image: 1flowbase-web
            dockerfile: docker/web.Dockerfile
            tag_prefix: web
          - component: api-server
            image: 1flowbase-api-server
            dockerfile: docker/api-server.Dockerfile
            tag_prefix: api-server
          - component: plugin-runner
            image: 1flowbase-plugin-runner
            dockerfile: docker/plugin-runner.Dockerfile
            tag_prefix: plugin-runner
    steps:
      - name: Select component
        id: select
        shell: bash
        run: |
          set -euo pipefail

          enabled=false
          image_tag=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.component }}" == "${{ matrix.component }}" ]]; then
              enabled=true
              image_tag="${{ inputs.image_tag }}"
            fi
          else
            ref_name="${GITHUB_REF_NAME}"
            tag_prefix="${{ matrix.tag_prefix }}/"
            if [[ "$ref_name" == "$tag_prefix"v* ]]; then
              enabled=true
              image_tag="${ref_name#${tag_prefix}}"
            fi
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.select.outputs.enabled == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.select.outputs.enabled == 'true'

      - uses: docker/login-action@v3
        if: steps.select.outputs.enabled == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate component version
        if: steps.select.outputs.enabled == 'true'
        run: node scripts/node/verify-container-version.js ${{ matrix.component }} ${{ steps.select.outputs.image_tag }}

      - name: Build and push ${{ matrix.image }}
        if: steps.select.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.select.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.select.outputs.image_tag }}
            org.opencontainers.image.title=${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
