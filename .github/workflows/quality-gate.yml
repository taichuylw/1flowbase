name: manual quality gate

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Target branch
        type: choice
        default: latest
        options:
          - latest
          - main
      scope:
        description: Quality gate scope
        type: choice
        default: ci
        options:
          - ci
          - repo
          - backend
          - backend-consistency
          - coverage
      report_type:
        description: Report type
        type: choice
        default: ci
        options:
          - ci
          - cd
      environment:
        description: Optional environment label
        type: string
        required: false

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: quality-gate-${{ inputs.target_branch }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
      - name: Resolve quality gate target SHA
        run: echo "QUALITY_GATE_TARGET_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: ./.github/actions/quality-gate
        env:
          GITHUB_REF_NAME: ${{ inputs.target_branch }}
          GITHUB_SHA: ${{ env.QUALITY_GATE_TARGET_SHA }}
        with:
          scope: ${{ inputs.scope }}
          report_type: ${{ inputs.report_type }}
          environment: ${{ inputs.environment }}
          publish_issue: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-governance-artifacts
          path: tmp/test-governance
