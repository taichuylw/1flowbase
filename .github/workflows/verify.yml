name: verify

on:
  pull_request:
  push:
    branches:
      - main
      - latest

permissions:
  contents: read
  issues: write

concurrency:
  group: quality-gate-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  repo-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/quality-gate
        with:
          scope: repo
          report_type: ci
          publish_issue: "false"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-governance-repo
          path: tmp/test-governance

  backend-consistency-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/quality-gate
        with:
          scope: backend-consistency
          report_type: ci
          publish_issue: "false"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-governance-backend-consistency
          path: tmp/test-governance

  coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: ./.github/actions/quality-gate
        with:
          scope: coverage
          report_type: ci
          publish_issue: "false"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-governance-coverage
          path: tmp/test-governance

  react-doctor-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: millionco/react-doctor@main
        with:
          directory: web/app
          diff: main
          fail-on: warning
          offline: "true"
          node-version: 22

  verify:
    needs:
      - repo-gate
      - backend-consistency-gate
      - coverage-gate
      - react-doctor-gate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          pattern: test-governance-*
          path: tmp/test-governance/parallel
          merge-multiple: false
      - run: node scripts/node/github-quality-gate-aggregate.js
        env:
          INPUT_ARTIFACT_ROOT: tmp/test-governance/parallel
          INPUT_REPORT_TYPE: ci
          INPUT_PUBLISH_ISSUE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/latest' }}
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-governance-artifacts
          path: tmp/test-governance
